<svg viewBox="0 0 880 640" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>ai-runbooks v1 architecture: NemoClaw sandbox + H Holo + Gradium STT</title>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="640" fill="#ffffff"/>

  <!-- HOST -->
  <rect x="20" y="20" width="250" height="600" rx="10" fill="none" stroke="#9ca3af" stroke-dasharray="5 4"/>
  <text x="36" y="46" font-size="13" font-weight="600" fill="#111827">HOST · Mac</text>

  <rect x="36" y="70" width="218" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="145" y="94" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">recording .mp4</text>
  <text x="145" y="111" font-size="11" fill="#6b7280" text-anchor="middle">video + narration audio</text>
  <text x="145" y="146" font-size="10" fill="#9ca3af" text-anchor="middle">per RECORDING_CONTRACT.md</text>

  <rect x="36" y="170" width="218" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="145" y="194" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">nemohermes CLI</text>
  <text x="145" y="211" font-size="11" fill="#6b7280" text-anchor="middle">onboard · policies · snapshots</text>

  <rect x="36" y="520" width="218" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="145" y="544" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">OPENROUTER_API_KEY</text>
  <text x="145" y="561" font-size="11" fill="#6b7280" text-anchor="middle">never enters sandbox</text>

  <!-- file drop arrow -->
  <line x1="254" y1="99" x2="300" y2="99" stroke="#6b7280" marker-end="url(#ar)"/>
  <text x="277" y="88" font-size="10" fill="#6b7280" text-anchor="middle">drop</text>

  <!-- SANDBOX -->
  <rect x="300" y="20" width="340" height="600" rx="10" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text x="316" y="46" font-size="13" font-weight="600" fill="#2563eb">NEMOCLAW · OpenShell sandbox · Hermes agent</text>

  <rect x="316" y="70" width="150" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="391" y="93" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">① ffmpeg frames</text>
  <text x="391" y="110" font-size="11" fill="#6b7280" text-anchor="middle">keyframes + 1fps</text>

  <rect x="474" y="70" width="150" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="549" y="93" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">①' ffmpeg audio</text>
  <text x="549" y="110" font-size="11" fill="#6b7280" text-anchor="middle">-vn → audio.wav</text>

  <rect x="316" y="160" width="150" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="391" y="183" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">② frame pairs</text>
  <text x="391" y="200" font-size="11" fill="#6b7280" text-anchor="middle">before/after → Holo</text>

  <rect x="474" y="160" width="150" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="549" y="183" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">②' transcribe</text>
  <text x="549" y="200" font-size="11" fill="#6b7280" text-anchor="middle">wav → Gradium STT</text>

  <rect x="316" y="250" width="150" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="391" y="273" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">steps.jsonl</text>
  <text x="391" y="290" font-size="11" fill="#6b7280" text-anchor="middle">action·target·evidence</text>

  <rect x="474" y="250" width="150" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="549" y="273" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">transcript.jsonl</text>
  <text x="549" y="290" font-size="11" fill="#6b7280" text-anchor="middle">{t0,t1,text} intent</text>

  <rect x="316" y="344" width="308" height="58" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="470" y="367" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">③ synthesis · Hermes brain</text>
  <text x="470" y="384" font-size="11" fill="#6b7280" text-anchor="middle">align by timestamp · dedup · vision=what, voice=why</text>

  <rect x="316" y="436" width="308" height="52" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="470" y="458" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">④ /sandbox/runbooks/runbook.md</text>
  <text x="470" y="474" font-size="11" fill="#6b7280" text-anchor="middle">persists · snapshot per run</text>

  <rect x="316" y="520" width="308" height="58" rx="8" fill="none" stroke="#9ca3af"/>
  <text x="470" y="543" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">OpenShell gateway</text>
  <text x="470" y="560" font-size="11" fill="#6b7280" text-anchor="middle">inference routing · YAML egress · deny by default</text>

  <!-- flows inside sandbox -->
  <line x1="391" y1="128" x2="391" y2="160" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="549" y1="128" x2="549" y2="160" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="391" y1="218" x2="391" y2="250" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="549" y1="218" x2="549" y2="250" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="391" y1="308" x2="391" y2="344" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="549" y1="308" x2="549" y2="344" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="470" y1="402" x2="470" y2="436" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="360" y1="402" x2="340" y2="520" stroke="#6b7280" marker-end="url(#ar)"/>

  <!-- key inject -->
  <line x1="254" y1="549" x2="316" y2="549" stroke="#6b7280" marker-end="url(#ar)"/>
  <text x="285" y="540" font-size="10" fill="#6b7280" text-anchor="middle">inject</text>

  <!-- EGRESS -->
  <rect x="670" y="20" width="190" height="600" rx="10" fill="none" stroke="#9ca3af" stroke-dasharray="5 4"/>
  <text x="686" y="46" font-size="13" font-weight="600" fill="#111827">ALLOWED EGRESS</text>

  <rect x="686" y="160" width="158" height="66" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="765" y="183" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">api.hcompany.ai</text>
  <text x="765" y="199" font-size="11" fill="#6b7280" text-anchor="middle">Holo VLM · sees pixels</text>
  <text x="765" y="215" font-size="11" fill="#6b7280" text-anchor="middle">holo3-1-35b / 122b</text>

  <rect x="686" y="250" width="158" height="66" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="765" y="273" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">api.gradium.ai</text>
  <text x="765" y="289" font-size="11" fill="#6b7280" text-anchor="middle">STT REST · hears voice</text>
  <text x="765" y="305" font-size="11" fill="#6b7280" text-anchor="middle">timestamped segments</text>

  <rect x="686" y="520" width="158" height="58" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="765" y="543" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">OpenRouter</text>
  <text x="765" y="560" font-size="11" fill="#6b7280" text-anchor="middle">synthesis · sees text only</text>

  <rect x="686" y="404" width="158" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-dasharray="4 3"/>
  <text x="765" y="425" font-size="12" font-weight="600" fill="#991b1b" text-anchor="middle">everything else</text>
  <text x="765" y="441" font-size="11" fill="#b91c1c" text-anchor="middle">✕ blocked + logged</text>

  <!-- egress arrows -->
  <line x1="466" y1="189" x2="686" y2="192" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="624" y1="189" x2="686" y2="282" stroke="#6b7280" marker-end="url(#ar)"/>
  <line x1="624" y1="549" x2="686" y2="549" stroke="#6b7280" marker-end="url(#ar)"/>

  <!-- phase 2 note -->
  <text x="765" y="605" font-size="10" fill="#9ca3af" text-anchor="middle">phase 2: + agp.eu.hcompany.ai (replay)</text>
</svg>
